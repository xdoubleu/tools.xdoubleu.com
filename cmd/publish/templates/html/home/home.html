{{ template "header" }}
{{ template "navbar" }}
<style>
    .tool-card {
        border-radius: 12px;
        transition: all 0.15s ease;
    }

    .tool-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }
</style>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">tools.xdoubleu.com</h1>
    </div>
    <div class="row g-4">
        {{ range . }}
            <div class="col-md-4 col-lg-3">
                <a href="/{{ . }}" class="text-decoration-none">
                    <div class="card tool-card text-center p-4 shadow-sm">
                        <h5 class="mb-0 text-body">
                            {{ . }}
                        </h5>
                    </div>
                </a>
            </div>
        {{ end }}
    </div>
</div>
{{ template "footer" }}
{{ template "page_end" }}

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        RELEASE: ${RELEASE:-dev}
    environment:
      API_URL: ${API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

{{define "header"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tools.xdoubleu.com</title>
    <link rel="icon" href="/images/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <script>
        (function() {
            var mq = window.matchMedia('(prefers-color-scheme: dark)');
            document.documentElement.setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
            mq.addEventListener('change', function(e) {
                document.documentElement.setAttribute('data-bs-theme', e.matches ? 'dark' : 'light');
            });
        })();
        (function() {
            var buf = [], max = 50;
            window.__consoleLogs = buf;
            ['log', 'warn', 'error'].forEach(function(level) {
                var orig = console[level];
                console[level] = function() {
                    var args = Array.prototype.slice.call(arguments);
                    var msg = args.map(function(a) {
                        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
                        catch (_) { return String(a); }
                    }).join(' ');
                    buf.push({ t: new Date().toISOString(), level: level, msg: msg });
                    if (buf.length > max) buf.shift();
                    orig.apply(console, args);
                };
            });
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .btn { border-radius: 0; }
        [data-bs-theme="dark"] .btn-dark {
            --bs-btn-color: var(--bs-body-color);
            --bs-btn-bg: var(--bs-tertiary-bg);
            --bs-btn-border-color: var(--bs-tertiary-bg);
            --bs-btn-hover-color: var(--bs-body-color);
            --bs-btn-hover-bg: var(--bs-secondary-bg);
            --bs-btn-hover-border-color: var(--bs-secondary-bg);
            --bs-btn-active-color: var(--bs-body-color);
            --bs-btn-active-bg: var(--bs-secondary-bg);
            --bs-btn-active-border-color: var(--bs-secondary-bg);
        }
        [data-bs-theme="dark"] .btn-outline-dark {
            --bs-btn-color: var(--bs-body-color);
            --bs-btn-border-color: var(--bs-tertiary-bg);
            --bs-btn-hover-color: var(--bs-body-color);
            --bs-btn-hover-bg: var(--bs-tertiary-bg);
            --bs-btn-hover-border-color: var(--bs-tertiary-bg);
            --bs-btn-active-color: var(--bs-body-color);
            --bs-btn-active-bg: var(--bs-tertiary-bg);
            --bs-btn-active-border-color: var(--bs-tertiary-bg);
        }
    </style>
</head>
<body>
{{end}}

{{define "footer"}}
    <footer class="container py-3 border-top mt-5">
        <small class="text-body-secondary">
            &copy; {{copyrightYear}} <a href="https://xdoubleu.com">xdoubleu</a>
            · Version {{release}}
            · <a href="#" data-bs-toggle="modal" data-bs-target="#bugReportModal">Report a bug</a>
        </small>
    </footer>

    <div class="modal fade" id="bugReportModal" tabindex="-1" aria-labelledby="bugReportModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="bug-report-form">
                    <input type="hidden" name="page" id="bug-report-page">
                    <input type="hidden" name="consoleLogs" id="bug-report-console-logs">
                    <input type="hidden" name="wsLog" id="bug-report-ws-log">
                    <div class="modal-header">
                        <h5 class="modal-title" id="bugReportModalLabel">Report a bug</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="bug-title">Short summary</label>
                            <input class="form-control" id="bug-title" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="bug-description">What went wrong?</label>
                            <textarea class="form-control" id="bug-description" name="description" rows="4" required></textarea>
                        </div>
                        <div id="bug-report-result" class="d-none"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-danger">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.getElementById('bug-report-form').onsubmit = async e => {
            e.preventDefault();
            document.getElementById('bug-report-page').value = window.location.href;
            document.getElementById('bug-report-console-logs').value =
                (window.__consoleLogs || [])
                    .map(function(e) { return '[' + e.t + '] ' + e.level.toUpperCase() + ': ' + e.msg; })
                    .join('\n');
            document.getElementById('bug-report-ws-log').value =
                (window.__wsLog || [])
                    .map(function(e) { return '[' + e.t + '] ' + e.dir + ' ' + e.type + ' (' + e.trackType + ')'; })
                    .join('\n');
            const result = document.getElementById('bug-report-result');
            result.className = 'd-none';
            const res = await fetch('/api/bug-report', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: new URLSearchParams(new FormData(e.target)),
            });
            result.classList.remove('d-none');
            if (res.ok) {
                const data = await res.json();
                result.className = 'alert alert-success';
                result.innerHTML = `Bug reported! <a href="${data.url}" target="_blank">View issue</a>`;
                e.target.reset();
            } else {
                result.className = 'alert alert-danger';
                result.textContent = 'Failed to submit. Please try again.';
            }
        };
    </script>
{{end}}

{{define "page_end"}}
</body>
</html>
{{end}}

syntax = "proto3";
package reading.v1;
option go_package = "tools.xdoubleu.com/gen/reading/v1;readingv1";

message KoboDevice {
  string id = 1;
  string name = 2;
  string serial = 3;
  string created_at = 4;
  string last_seen_at = 5;
  bool logging_enabled = 6;
}

// KoboLogEntry is a single captured device request/response pair, held in
// memory while debug logging is enabled for a device.
message KoboLogEntry {
  string time = 1;
  string method = 2;
  string path = 3;
  string query = 4;
  string request_body = 5;
  int32 status = 6;
  string response_body = 7;
}

message EnableKoboSyncRequest { string book_id = 1; }
message EnableKoboSyncResponse { string kepub_status = 1; }

message RegisterKoboDeviceRequest {
  string name = 1;
  string serial = 2;
}
message RegisterKoboDeviceResponse {
  KoboDevice device = 1;
  string raw_token = 2;
}

message ListKoboDevicesRequest {}
message ListKoboDevicesResponse { repeated KoboDevice devices = 1; }

message DisconnectKoboDeviceRequest { string id = 1; }
message DisconnectKoboDeviceResponse {}

message SetKoboDeviceLoggingRequest {
  string id = 1;
  bool enabled = 2;
}
message SetKoboDeviceLoggingResponse {}

message GetKoboDeviceLogsRequest { string id = 1; }
message GetKoboDeviceLogsResponse { repeated KoboLogEntry entries = 1; }

message ClearKoboDeviceLogsRequest { string id = 1; }
message ClearKoboDeviceLogsResponse {}

service KoboService {
  rpc EnableKoboSync(EnableKoboSyncRequest) returns (EnableKoboSyncResponse);
  rpc RegisterKoboDevice(RegisterKoboDeviceRequest) returns (RegisterKoboDeviceResponse);
  rpc ListKoboDevices(ListKoboDevicesRequest) returns (ListKoboDevicesResponse);
  rpc DisconnectKoboDevice(DisconnectKoboDeviceRequest) returns (DisconnectKoboDeviceResponse);
  rpc SetKoboDeviceLogging(SetKoboDeviceLoggingRequest) returns (SetKoboDeviceLoggingResponse);
  rpc GetKoboDeviceLogs(GetKoboDeviceLogsRequest) returns (GetKoboDeviceLogsResponse);
  rpc ClearKoboDeviceLogs(ClearKoboDeviceLogsRequest) returns (ClearKoboDeviceLogsResponse);
}

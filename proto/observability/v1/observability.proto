syntax = "proto3";
package observability.v1;
option go_package = "tools.xdoubleu.com/gen/observability/v1;observabilityv1";

service ObservabilityService {
  rpc GetJobStats(GetJobStatsRequest) returns (GetJobStatsResponse);
  rpc GetUsageStats(GetUsageStatsRequest) returns (GetUsageStatsResponse);
  rpc GetStorageStats(GetStorageStatsRequest) returns (GetStorageStatsResponse);
  rpc GetDatabaseStats(GetDatabaseStatsRequest)
      returns (GetDatabaseStatsResponse);
  rpc GetGithubIssues(GetGithubIssuesRequest) returns (GetGithubIssuesResponse);
  rpc GetSentryIssues(GetSentryIssuesRequest) returns (GetSentryIssuesResponse);
  rpc GetDeployStatus(GetDeployStatusRequest) returns (GetDeployStatusResponse);
  rpc GetHealthOverview(GetHealthOverviewRequest)
      returns (GetHealthOverviewResponse);
  rpc ListOAuthConnections(ListOAuthConnectionsRequest)
      returns (ListOAuthConnectionsResponse);
  rpc DisconnectOAuthConnection(DisconnectOAuthConnectionRequest)
      returns (DisconnectOAuthConnectionResponse);
}

message JobStat {
  string job_id = 1;
  int64 total_runs = 2;
  int64 failed_runs = 3;
  int64 avg_duration_ms = 4;
  string last_run_at = 5;  // RFC3339
}

message JobRun {
  string job_id = 1;
  string started_at = 2;  // RFC3339
  int64 duration_ms = 3;
  bool success = 4;
  string error = 5;
}

message GetJobStatsRequest {
  int32 window_days = 1;
}

message GetJobStatsResponse {
  repeated JobStat stats = 1;
  repeated JobRun recent_runs = 2;
}

message UsageDay {
  string day = 1;  // YYYY-MM-DD
  string app = 2;
  string endpoint = 3;
  int64 count = 4;
}

message GetUsageStatsRequest {
  int32 window_days = 1;
}

message GetUsageStatsResponse {
  repeated UsageDay entries = 1;
}

message PrefixStat {
  string prefix = 1;
  int64 size_bytes = 2;
  int64 count = 3;
}

message StorageSnapshot {
  string scanned_at = 1;  // RFC3339
  int64 total_size_bytes = 2;
  int64 object_count = 3;
  int64 orphan_size_bytes = 4;
  int64 orphan_count = 5;
  int64 stale_upload_size_bytes = 6;
  int64 stale_upload_count = 7;
  repeated PrefixStat prefix_breakdown = 8;
}

message GetStorageStatsRequest {}

message GetStorageStatsResponse {
  StorageSnapshot latest = 1;
  repeated StorageSnapshot history = 2;
}

message SchemaStat {
  string name = 1;
  int64 size_bytes = 2;
  int64 table_count = 3;
}

message GetDatabaseStatsRequest {}

message GetDatabaseStatsResponse {
  int64 total_size_bytes = 1;
  repeated SchemaStat schemas = 2;
}

// GithubIssue is a single open issue on the configured repository.
message GithubIssue {
  int64 number = 1;
  string title = 2;
  string url = 3;
  string state = 4;
  string created_at = 5;  // RFC3339
  repeated string labels = 6;
}

message GetGithubIssuesRequest {}

// GetGithubIssuesResponse carries the open issues. configured is false when no
// GitHub token/repo is set — the section is degraded, not failed.
message GetGithubIssuesResponse {
  repeated GithubIssue issues = 1;
  bool configured = 2;
  int32 open_count = 3;
}

// SentryIssue is a single unresolved issue on the configured project.
message SentryIssue {
  string id = 1;
  string title = 2;
  string culprit = 3;
  string permalink = 4;
  int64 count = 5;  // number of events
  string last_seen = 6;  // RFC3339
  string level = 7;
}

message GetSentryIssuesRequest {}

// GetSentryIssuesResponse carries the unresolved issues. configured is false
// when no Sentry org/project/token is set — the section is degraded.
message GetSentryIssuesResponse {
  repeated SentryIssue issues = 1;
  bool configured = 2;
  int32 unresolved_count = 3;
}

message GetDeployStatusRequest {}

// GetDeployStatusResponse carries the latest deployment. configured is false
// when no DigitalOcean token/app ID is set — the section is degraded. All
// deployment fields are empty when configured is false or no deployment exists.
message GetDeployStatusResponse {
  bool configured = 1;
  string phase = 2;
  string cause = 3;
  string created_at = 4;  // RFC3339
  string updated_at = 5;  // RFC3339
  string deployment_id = 6;
}

message GetHealthOverviewRequest {}

// GetHealthOverviewResponse rolls up the three external signals into one call,
// each section degrading independently.
message GetHealthOverviewResponse {
  GetGithubIssuesResponse github = 1;
  GetSentryIssuesResponse sentry = 2;
  GetDeployStatusResponse deploy = 3;
}

// OAuthConnectionStatus is the admin-facing status of one provider's OAuth
// connection (issue #440) — never the token itself.
message OAuthConnectionStatus {
  string provider = 1;  // "github" | "sentry" | "digitalocean"
  bool connected = 2;
  string connected_by = 3;  // email, empty if not connected
  string connected_at = 4;  // RFC3339, empty if not connected
  string expires_at = 5;    // RFC3339, empty if non-expiring or not connected
}

message ListOAuthConnectionsRequest {}

message ListOAuthConnectionsResponse {
  repeated OAuthConnectionStatus connections = 1;
}

message DisconnectOAuthConnectionRequest {
  string provider = 1;
}

message DisconnectOAuthConnectionResponse {}

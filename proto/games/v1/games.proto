syntax = "proto3";
package games.v1;
option go_package = "tools.xdoubleu.com/gen/games/v1;gamesv1";

message Game {
  int32 id = 1;
  string name = 2;
  bool is_delisted = 3;
  string completion_rate = 4;
  string contribution = 5;
  int32 playtime = 6;
  string image_url = 7;
  string last_synced_at = 8;
  bool favourite = 9;
}

message Achievement {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string icon_url = 4;
  bool achieved = 5;
  optional double global_percent = 6;
}

message SteamResponse {
  repeated Game not_started = 1;
  repeated Game in_progress = 2;
  repeated Game completed = 3;
  int32 total_backlog = 4;
  string current_rate = 5;
  repeated int32 distribution = 6;
  repeated string labels = 7;
  repeated string values = 8;
  string date_start = 9;
  string date_end = 10;
}

message SteamGameResponse {
  Game game = 1;
  repeated Achievement achievements = 2;
}

message SteamDistributionResponse {
  string label = 1;
  repeated Game games = 2;
}

message RecentGame {
  int32 id = 1;
  string name = 2;
  string completion_rate = 3;
  int32 recent_unlocks = 4;
  string last_unlocked_at = 5;
  string image_url = 6;
}

// Integrations holds the user's external-account settings for the games app.
message Integrations {
  reserved 1, 3;
  reserved "steam_api_key", "hardcover_api_key";
  string steam_user_id = 2;
}

message GetSteamRequest {
  string date_start = 1;
  string date_end = 2;
}
message GetSteamResponse { SteamResponse steam = 1; }

message GetSteamGameRequest { int32 game_id = 1; }
message GetSteamGameResponse { SteamGameResponse data = 1; }

message GetSteamDistributionRequest { int32 bucket = 1; }
message GetSteamDistributionResponse { SteamDistributionResponse data = 1; }

message GetRecentlyActiveGamesRequest {}
message GetRecentlyActiveGamesResponse { repeated RecentGame games = 1; }

message RefreshSteamGameRequest { int32 game_id = 1; }
message RefreshSteamGameResponse { SteamGameResponse data = 1; }

message GetIntegrationsRequest {}
message GetIntegrationsResponse { Integrations integrations = 1; }

message SaveIntegrationsRequest { Integrations integrations = 1; }
message SaveIntegrationsResponse {}

message SetGameFavouriteRequest {
  int32 game_id = 1;
  bool favourite = 2;
}
message SetGameFavouriteResponse { Game game = 1; }

service GamesService {
  rpc GetSteam(GetSteamRequest) returns (GetSteamResponse);
  rpc GetSteamGame(GetSteamGameRequest) returns (GetSteamGameResponse);
  rpc GetSteamDistribution(GetSteamDistributionRequest) returns (GetSteamDistributionResponse);
  rpc GetRecentlyActiveGames(GetRecentlyActiveGamesRequest) returns (GetRecentlyActiveGamesResponse);
  rpc RefreshSteamGame(RefreshSteamGameRequest) returns (RefreshSteamGameResponse);
  rpc GetIntegrations(GetIntegrationsRequest) returns (GetIntegrationsResponse);
  rpc SaveIntegrations(SaveIntegrationsRequest) returns (SaveIntegrationsResponse);
  rpc SetGameFavourite(SetGameFavouriteRequest) returns (SetGameFavouriteResponse);
}

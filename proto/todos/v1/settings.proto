syntax = "proto3";
package todos.v1;
option go_package = "tools.xdoubleu.com/gen/todos/v1;todosv1";

message Section {
  string id = 1;
  string owner_user_id = 2;
  string name = 3;
  int32 sort_order = 4;
  string created_at = 5;
  string workspace_id = 6;
}

message LabelPreset {
  string value = 1;
  string color = 2;
}

message URLPattern {
  string id = 1;
  string user_id = 2;
  string url_prefix = 3;
  string platform_name = 4;
  string label = 5;
  string shortcut = 6;
  int32 sort_order = 7;
}

message ArchiveSettings {
  string user_id = 1;
  int32 archive_after_hours = 2;
}

message Policy {
  string id = 1;
  string owner_user_id = 2;
  string text = 3;
  int32 reappear_after_hours = 4;
  int32 sort_order = 5;
  string created_at = 6;
  string workspace_id = 7;
}

message Workspace {
  string id = 1;
  string owner_user_id = 2;
  string name = 3;
  string created_at = 4;
}

message UserSettings {
  string user_id = 1;
  string active_workspace_id = 2;
  bool hide_shortcut_hints = 3;
}

message GetSettingsRequest {}
message GetSettingsResponse {
  repeated LabelPreset label_presets = 1;
  repeated URLPattern url_patterns = 2;
  ArchiveSettings archive = 3;
  repeated Section sections = 4;
  repeated Policy policies = 5;
  repeated Workspace workspaces = 6;
  UserSettings user_settings = 7;
}

message UpdateArchiveSettingsRequest { int32 archive_after_hours = 1; }
message UpdateArchiveSettingsResponse {}
message CreateLabelPresetRequest { string category = 1; string value = 2; string workspace_id = 3; }
message CreateLabelPresetResponse {}
message DeleteLabelPresetRequest { string category = 1; string value = 2; string workspace_id = 3; }
message DeleteLabelPresetResponse {}
message UpdateLabelColorRequest { string category = 1; string value = 2; string color = 3; string workspace_id = 4; }
message UpdateLabelColorResponse {}
message CreateURLPatternRequest { string url_prefix = 1; string platform_name = 2; string label = 3; string shortcut = 4; string workspace_id = 5; }
message CreateURLPatternResponse {}
message DeleteURLPatternRequest { string id = 1; }
message DeleteURLPatternResponse {}
message CreateSectionRequest { string name = 1; string workspace_id = 2; }
message CreateSectionResponse {}
message DeleteSectionRequest { string id = 1; }
message DeleteSectionResponse {}
message CreatePolicyRequest { string text = 1; int32 reappear_after_hours = 2; string workspace_id = 3; }
message CreatePolicyResponse {}
message UpdatePolicyRequest { string id = 1; string text = 2; int32 reappear_after_hours = 3; }
message UpdatePolicyResponse {}
message DeletePolicyRequest { string id = 1; }
message DeletePolicyResponse {}
message CreateWorkspaceRequest { string name = 1; }
message CreateWorkspaceResponse {}
message DeleteWorkspaceRequest { string id = 1; }
message DeleteWorkspaceResponse {}
message UpdateHideShortcutHintsRequest { bool hide = 1; }
message UpdateHideShortcutHintsResponse {}
message SetActiveWorkspaceRequest { string workspace_id = 1; }
message SetActiveWorkspaceResponse {}

service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);
  rpc UpdateArchiveSettings(UpdateArchiveSettingsRequest) returns (UpdateArchiveSettingsResponse);
  rpc CreateLabelPreset(CreateLabelPresetRequest) returns (CreateLabelPresetResponse);
  rpc DeleteLabelPreset(DeleteLabelPresetRequest) returns (DeleteLabelPresetResponse);
  rpc UpdateLabelColor(UpdateLabelColorRequest) returns (UpdateLabelColorResponse);
  rpc CreateURLPattern(CreateURLPatternRequest) returns (CreateURLPatternResponse);
  rpc DeleteURLPattern(DeleteURLPatternRequest) returns (DeleteURLPatternResponse);
  rpc CreateSection(CreateSectionRequest) returns (CreateSectionResponse);
  rpc DeleteSection(DeleteSectionRequest) returns (DeleteSectionResponse);
  rpc CreatePolicy(CreatePolicyRequest) returns (CreatePolicyResponse);
  rpc UpdatePolicy(UpdatePolicyRequest) returns (UpdatePolicyResponse);
  rpc DeletePolicy(DeletePolicyRequest) returns (DeletePolicyResponse);
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc UpdateHideShortcutHints(UpdateHideShortcutHintsRequest) returns (UpdateHideShortcutHintsResponse);
  rpc SetActiveWorkspace(SetActiveWorkspaceRequest) returns (SetActiveWorkspaceResponse);
}

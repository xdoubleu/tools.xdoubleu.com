syntax = "proto3";
package todos.v1;
option go_package = "tools.xdoubleu.com/gen/todos/v1;todosv1";

message TaskLink {
  string id = 1;
  string task_id = 2;
  string url = 3;
  string label = 4;
  int32 sort_order = 5;
  string shortcut_badge = 6;
}

message Subtask {
  string id = 1;
  string task_id = 2;
  string title = 3;
  string description = 4;
  bool done = 5;
  int32 sort_order = 6;
  int32 priority = 7;
  repeated string labels = 8;
  string due_date = 9;
  string deadline = 10;
  string created_at = 11;
  string updated_at = 12;
  string parent_subtask_id = 13;
  repeated Subtask children = 14;
}

message Task {
  string id = 1;
  string owner_user_id = 2;
  string title = 3;
  string description = 4;
  repeated string labels = 5;
  string status = 6;
  int32 priority = 7;
  int32 sort_order = 8;
  string completed_at = 9;
  string archived_at = 10;
  string due_date = 11;
  string deadline = 12;
  string created_at = 13;
  string updated_at = 14;
  string section_id = 15;
  string workspace_id = 16;
  int32 recur_days = 17;
  string recur_rule = 18;
  repeated TaskLink links = 19;
  repeated Subtask subtasks = 20;
  int32 subtask_done = 21;
  int32 subtask_total = 22;
}

message ListTasksRequest {
  string workspace_id = 1;
  string section_id = 2;
  string status = 3;
}
message ListTasksResponse { repeated Task tasks = 1; }

message GetTaskRequest { string id = 1; }
message GetTaskResponse { Task task = 1; }

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  string label = 3;
  string due_date = 4;
  string deadline = 5;
  string section_id = 6;
  int32 priority = 7;
  int32 recur_days = 8;
  string recur_rule = 9;
}
message CreateTaskResponse { Task task = 1; }

message UpdateTaskRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  string label = 4;
  string due_date = 5;
  string deadline = 6;
  string section_id = 7;
  int32 priority = 8;
  int32 recur_days = 9;
  string recur_rule = 10;
}
message UpdateTaskResponse { Task task = 1; }

message CompleteTaskRequest { string id = 1; }
message CompleteTaskResponse {}
message ReopenTaskRequest { string id = 1; }
message ReopenTaskResponse {}
message DeleteTaskRequest { string id = 1; }
message DeleteTaskResponse {}
message ReorderTasksRequest { repeated string ids = 1; }
message ReorderTasksResponse {}

message SearchTasksRequest {
  string query = 1;
  string workspace_id = 2;
}
message SearchTasksResponse {
  repeated Task open = 1;
  repeated Task done = 2;
  repeated Task archived = 3;
}
message QuickAddTaskRequest {
  string input = 1;
  string description = 2;
  string section_id = 3;
}
message QuickAddTaskResponse { Task task = 1; }
message QuickUpdateTaskRequest {
  string id = 1;
  string input = 2;
  string description = 3;
}
message QuickUpdateTaskResponse {}
message MoveTaskSectionRequest {
  string task_id = 1;
  string section_id = 2;
}
message MoveTaskSectionResponse {}

service TaskService {
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse);
  rpc ReopenTask(ReopenTaskRequest) returns (ReopenTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc ReorderTasks(ReorderTasksRequest) returns (ReorderTasksResponse);
  rpc SearchTasks(SearchTasksRequest) returns (SearchTasksResponse);
  rpc QuickAddTask(QuickAddTaskRequest) returns (QuickAddTaskResponse);
  rpc QuickUpdateTask(QuickUpdateTaskRequest) returns (QuickUpdateTaskResponse);
  rpc MoveTaskSection(MoveTaskSectionRequest) returns (MoveTaskSectionResponse);
}

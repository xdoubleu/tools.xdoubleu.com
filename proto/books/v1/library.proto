syntax = "proto3";
package books.v1;
option go_package = "tools.xdoubleu.com/gen/books/v1;booksv1";

message Book {
  string id = 1;
  string title = 2;
  repeated string authors = 3;
  string isbn13 = 4;
  string cover_url = 5;
  string description = 6;
  int32 page_count = 7;
  reserved 8, 9;
  reserved "isbn10", "external_refs";
}

message UserBook {
  string id = 1;
  string user_id = 2;
  string book_id = 3;
  Book book = 4;
  string status = 5;
  repeated string tags = 6;
  int32 rating = 7;
  reserved 8;
  repeated string finished_at = 9;
  string added_at = 10;
  string updated_at = 11;
  string progress_mode = 12;
  int32 current_page = 13;
  int32 progress_percent = 14;
  repeated string formats = 15;
}

message BookShelf {
  string name = 1;
  repeated UserBook books = 2;
}

message LibraryResponse {
  repeated UserBook reading = 1;
  repeated UserBook wishlist = 2;
  repeated UserBook finished = 3;
  repeated BookShelf shelves = 4;
}

message BooksProgressResponse {
  repeated string labels = 1;
  repeated string values = 2;
  string date_start = 3;
  string date_end = 4;
}

message ExternalBookResult {
  string provider = 1;
  string provider_id = 2;
  string title = 3;
  repeated string authors = 4;
  string isbn13 = 5;
  string cover_url = 6;
  string description = 7;
}

message BookReadingStateData {
  string source = 1;
  int32 percent = 2;
  string location = 3;
  string updated_at = 4;
}

message GetLibraryRequest {}
message GetLibraryResponse { LibraryResponse library = 1; }

message GetBooksProgressRequest {
  string date_start = 1;
  string date_end = 2;
}
message GetBooksProgressResponse { BooksProgressResponse progress = 1; }

message SearchLibraryRequest { string query = 1; }
message SearchLibraryResponse { repeated UserBook books = 1; }

message SearchExternalRequest { string query = 1; }
message SearchExternalResponse { repeated ExternalBookResult results = 1; }

message CreateBookRequest {
  string provider = 1;
  string provider_id = 2;
  string title = 3;
  string author = 4;
  string status = 5;
  string isbn13 = 6;
  string cover_url = 7;
  string description = 8;
  bool own_physical = 9;
  bool own_digital = 10;
}
message CreateBookResponse {}

message UpdateBookStatusRequest {
  string book_id = 1;
  string status = 2;
  bool favourite = 3;
  string rating = 4;
  reserved 5;
}
message UpdateBookStatusResponse {}

message ToggleTagRequest {
  string book_id = 1;
  string tag = 2;
}
message ToggleTagResponse {}

message UpdateProgressRequest {
  string book_id = 1;
  string progress_mode = 2;
  int32 current_page = 3;
  int32 progress_percent = 4;
}
message UpdateProgressResponse {}

message UpdateReadingProgressRequest {
  string book_id = 1;
  string source = 2;
  int32 percent = 3;
  string location = 4;
}
message UpdateReadingProgressResponse {}

message GetReadingStateRequest { string book_id = 1; }
message GetReadingStateResponse { BookReadingStateData state = 1; }

message RenameShelfRequest { string old_name = 1; string new_name = 2; }
message RenameShelfResponse { uint32 moved = 1; }
// Reassign every book on `name` to `target_name`, after which `name` no longer exists.
message DeleteShelfRequest { string name = 1; string target_name = 2; }
message DeleteShelfResponse { uint32 moved = 1; }
message RenameTagRequest { string old_name = 1; string new_name = 2; }
message RenameTagResponse { uint32 affected = 1; }
message DeleteTagRequest { string name = 1; }
message DeleteTagResponse { uint32 affected = 1; }

service LibraryService {
  rpc GetLibrary(GetLibraryRequest) returns (GetLibraryResponse);
  rpc GetBooksProgress(GetBooksProgressRequest) returns (GetBooksProgressResponse);
  rpc SearchLibrary(SearchLibraryRequest) returns (SearchLibraryResponse);
  rpc SearchExternal(SearchExternalRequest) returns (SearchExternalResponse);
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc UpdateBookStatus(UpdateBookStatusRequest) returns (UpdateBookStatusResponse);
  rpc UpdateProgress(UpdateProgressRequest) returns (UpdateProgressResponse);
  rpc ToggleTag(ToggleTagRequest) returns (ToggleTagResponse);
  rpc UpdateReadingProgress(UpdateReadingProgressRequest) returns (UpdateReadingProgressResponse);
  rpc GetReadingState(GetReadingStateRequest) returns (GetReadingStateResponse);
  rpc RenameShelf(RenameShelfRequest) returns (RenameShelfResponse);
  rpc DeleteShelf(DeleteShelfRequest) returns (DeleteShelfResponse);
  rpc RenameTag(RenameTagRequest) returns (RenameTagResponse);
  rpc DeleteTag(DeleteTagRequest) returns (DeleteTagResponse);
}

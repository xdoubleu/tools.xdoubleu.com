syntax = "proto3";
package books.v1;
option go_package = "tools.xdoubleu.com/gen/books/v1;booksv1";

import "books/v1/library.proto";

message ImportBooksRequest { bytes csv_data = 1; }
message ImportBooksResponse { int32 imported_count = 1; }

message ClearLibraryRequest {}
message ClearLibraryResponse {
  uint32 deleted_books = 1;
  uint32 deleted_files = 2;
}

message DuplicateGroup {
  // Library entries judged to be the same book. entries[0] is the suggested
  // winner (the entry to keep); the rest are the suggested losers.
  repeated UserBook entries = 1;
  // Strongest matching signal: "isbn13" | "isbn10" | "title+author"
  string reason = 2;
}

message FindDuplicatesRequest {}
message FindDuplicatesResponse { repeated DuplicateGroup groups = 1; }

message MergeBooksRequest {
  // book_id of the UserBook entry to keep.
  string winner_book_id = 1;
  // book_ids of UserBook entries to merge into the winner, then delete.
  repeated string loser_book_ids = 2;
  // When set, these field values overwrite the winner's catalog Book row after
  // the merge. cover_url is excluded — control cover resolution via
  // resolved_cover_source_book_id instead.
  // Omit to keep the winner's existing metadata unchanged (current behavior).
  optional Book resolved_metadata = 3;
  // book_id whose cover should be used for the merged winner. The backend
  // copies that entry's raw cover URL and clears the winner's cover cache.
  // Omit to keep the winner's existing cover unchanged.
  optional string resolved_cover_source_book_id = 4;
  // When set, overrides the auto-consolidated status/shelf of the merged winner.
  // Omit to use the automatic rule: a custom shelf wins over built-in statuses
  // (custom-shelf > read > currently-reading > to-read > dropped).
  optional string resolved_status = 5;
}
message MergeBooksResponse {
  // Always 1 — one group merged per call.
  uint32 merged_groups = 1;
  // Duplicate file rows removed (after format+checksum dedup).
  uint32 deleted_files = 2;
}

message StartResyncRequest {}
message StartResyncResponse {}

// SourceBook is one candidate set of metadata for a catalog book — either the
// current library values (source = "") or one external provider's proposal
// (source = "openlibrary" | "googlebooks" | "unicat").
message SourceBook {
  string source = 1;
  string cover_url = 2;
  string description = 3;
  int32 page_count = 4;
  string isbn13 = 5;
  string title = 6;
  repeated string authors = 7;
  // differs lists which fields differ from the library row. Empty for the
  // library SourceBook itself.
  repeated string differs = 8;
}

// ResyncProposal describes one catalog book that differs from at least one
// external source, for the admin resync wizard to step through.
message ResyncProposal {
  string book_id = 1;
  SourceBook library = 2;
  repeated SourceBook sources = 3;
}

message ListResyncProposalsRequest {}
message ListResyncProposalsResponse {
  repeated ResyncProposal proposals = 1;
}

message ApplyResyncChoiceRequest {
  string book_id = 1;
  // source selects which SourceBook wins: "" keeps the library row unchanged
  // (and simply dismisses the proposal), or one of
  // "openlibrary" | "googlebooks" | "unicat".
  string source = 2;
}
message ApplyResyncChoiceResponse {}

message SetBookISBNRequest {
  string book_id = 1;
  string isbn13 = 2;
}
message SetBookISBNResponse {}

// GetBookSources live-fetches one book's candidates from every configured
// source, for the admin book-page source selector. Unlike
// ListResyncProposals, this works on any book on demand — it doesn't require
// a prior wizard scan to have flagged the book first.
message GetBookSourcesRequest {
  string book_id = 1;
}
message GetBookSourcesResponse {
  ResyncProposal proposal = 1;
}

// ApplyBookSource live-fetches the book's sources and applies the chosen one
// — the book-page equivalent of ApplyResyncChoice, usable on any book.
message ApplyBookSourceRequest {
  string book_id = 1;
  // source selects which source wins: one of
  // "openlibrary" | "googlebooks" | "unicat".
  string source = 2;
}
message ApplyBookSourceResponse {}

// BookRef is a lightweight snapshot of one book used in CSV comparison results.
message BookRef {
  string title = 1;
  repeated string authors = 2;
  string isbn13 = 3;
  // status is the reading shelf/state (e.g. "read", "to-read", custom shelf).
  string status = 4;
  // tags are the non-exclusive Goodreads bookshelves (distinct from status,
  // which is the one exclusive shelf).
  repeated string tags = 5;
}

// BookMismatch describes one pair of entries that differ between the CSV and
// the library. csv or library may be empty (zero-value) when the book only
// exists on one side. differences lists the active tags from the set:
//   "missing-in-library", "missing-in-csv", "status", "isbn", "title", "tags"
message BookMismatch {
  BookRef csv = 1;
  BookRef library = 2;
  repeated string differences = 3;
  // id is a stable per-row key for ApplyCSVFix: the library book_id when the
  // book is matched or library-only, or "csv:<index>" when it only exists in
  // the CSV.
  string id = 4;
}

message CompareCSVRequest { bytes csv_data = 1; }
message CompareCSVResponse {
  int32 csv_count = 1;
  int32 library_count = 2;
  int32 matched_count = 3;
  // mismatches contains only books that differ in some way.
  repeated BookMismatch mismatches = 4;
}

message ApplyCSVFixRequest {
  bytes csv_data = 1;
  // mismatch_id echoes BookMismatch.id from a prior CompareCSV response.
  string mismatch_id = 2;
  // difference is which tag to fix: "missing-in-library" | "status" | "isbn" | "title" | "tags".
  string difference = 3;
}
message ApplyCSVFixResponse {}

service CatalogService {
  rpc ImportBooks(ImportBooksRequest) returns (ImportBooksResponse);
  rpc CompareCSV(CompareCSVRequest) returns (CompareCSVResponse);
  rpc ApplyCSVFix(ApplyCSVFixRequest) returns (ApplyCSVFixResponse);
  rpc ClearLibrary(ClearLibraryRequest) returns (ClearLibraryResponse);
  rpc FindDuplicates(FindDuplicatesRequest) returns (FindDuplicatesResponse);
  rpc MergeBooks(MergeBooksRequest) returns (MergeBooksResponse);
  rpc StartResync(StartResyncRequest) returns (StartResyncResponse);
  rpc ListResyncProposals(ListResyncProposalsRequest) returns (ListResyncProposalsResponse);
  rpc ApplyResyncChoice(ApplyResyncChoiceRequest) returns (ApplyResyncChoiceResponse);
  rpc SetBookISBN(SetBookISBNRequest) returns (SetBookISBNResponse);
  rpc GetBookSources(GetBookSourcesRequest) returns (GetBookSourcesResponse);
  rpc ApplyBookSource(ApplyBookSourceRequest) returns (ApplyBookSourceResponse);
}

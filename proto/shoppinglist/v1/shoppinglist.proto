syntax = "proto3";
package shoppinglist.v1;
option go_package = "tools.xdoubleu.com/gen/shoppinglist/v1;shoppinglistv1";

message ShoppingItem {
  string name        = 1;
  string amount      = 2;
  string unit        = 3;
  string id          = 4;
  string recipe_name = 5;
  string group_name  = 6;
}

// owner_user_id, present on the data RPCs below, selects whose list to act on.
// Empty means the caller's own list. A non-empty value must reference a list
// the caller has been granted access to (see ShareShoppingList); writes also
// require can_edit on that grant.

message GetCustomListRequest  { string owner_user_id = 1; }
message GetCustomListResponse { repeated ShoppingItem items = 1; }

message CreateShoppingItemRequest {
  string name   = 1;
  string amount = 2;
  string unit   = 3;
  string owner_user_id = 4;
}
message CreateShoppingItemResponse { ShoppingItem item = 1; }

message UpdateShoppingItemRequest {
  string item_id = 1;
  string name    = 2;
  string amount  = 3;
  string unit    = 4;
  string owner_user_id = 5;
}
message UpdateShoppingItemResponse { ShoppingItem item = 1; }

message DeleteShoppingItemRequest  {
  string item_id = 1;
  string owner_user_id = 2;
}
message DeleteShoppingItemResponse {}

message GetMealPlanExportItemsRequest  {
  string plan_id = 1;
  repeated string excluded_groups = 2;
}
message GetMealPlanExportItemsResponse { repeated ShoppingItem items = 1; }

message GetPlanIngredientGroupsRequest  { string plan_id = 1; }
message PlanIngredientGroup {
  string recipe_name = 1;
  string group_name  = 2;
}
message GetPlanIngredientGroupsResponse {
  repeated PlanIngredientGroup groups = 1;
}

// --- Categories ---

message Category {
  string id   = 1;
  string name = 2;
}

message ListCategoriesRequest  { string owner_user_id = 1; }
message ListCategoriesResponse { repeated Category categories = 1; }

message CreateCategoryRequest  { string name = 1; string owner_user_id = 2; }
message CreateCategoryResponse { Category category = 1; }

message RenameCategoryRequest  {
  string id = 1;
  string name = 2;
  string owner_user_id = 3;
}
message RenameCategoryResponse { Category category = 1; }

message DeleteCategoryRequest  { string id = 1; string owner_user_id = 2; }
message DeleteCategoryResponse {}

// --- Stores ---

message Store {
  string id   = 1;
  string name = 2;
}

// Stores are private to the caller: the store RPCs always act on the
// authenticated user's own stores and take no owner_user_id (a shared-list
// recipient never gains access to the owner's stores).
message ListStoresRequest  { reserved 1; reserved "owner_user_id"; }
message ListStoresResponse { repeated Store stores = 1; }

message CreateStoreRequest  {
  string name = 1;
  reserved 2; reserved "owner_user_id";
}
message CreateStoreResponse { Store store = 1; }

message RenameStoreRequest  {
  string id = 1;
  string name = 2;
  reserved 3; reserved "owner_user_id";
}
message RenameStoreResponse { Store store = 1; }

message DeleteStoreRequest  {
  string id = 1;
  reserved 2; reserved "owner_user_id";
}
message DeleteStoreResponse {}

// Ordered list of categories for a store. GetStoreCategories returns the
// categories in walk-through order; SetStoreCategories fully replaces it,
// using array index as sort_order.
message GetStoreCategoriesRequest  {
  string store_id = 1;
  reserved 2; reserved "owner_user_id";
}
message GetStoreCategoriesResponse { repeated Category categories = 1; }

message SetStoreCategoriesRequest  {
  string store_id              = 1;
  repeated string category_ids = 2;
  reserved 3; reserved "owner_user_id";
}
message SetStoreCategoriesResponse {}

// --- Item catalog (name -> category) ---

// A known item name and the category it currently maps to. category_id is
// empty when the name has not been assigned a category yet. excluded is true
// when the name has been removed from the shopping-list export (its meal-plan
// entries carry exclude_from_shopping_list and it has no remaining active
// source); such names surface so the UI can offer to restore them.
message ItemName {
  string name        = 1;
  string category_id = 2;
  bool excluded      = 3;
}

message ItemCategory {
  string name        = 1;
  string category_id = 2;
}

message ListItemNamesRequest  { string owner_user_id = 1; }
message ListItemNamesResponse { repeated ItemName names = 1; }

message ListItemCategoriesRequest  { string owner_user_id = 1; }
message ListItemCategoriesResponse { repeated ItemCategory items = 1; }

message SetItemCategoryRequest  {
  string name = 1;
  string category_id = 2;
  string owner_user_id = 3;
}
message SetItemCategoryResponse {}

// SetItemExcluded removes a catalog name from (or restores it to) the shopping
// list export. Removing flips exclude_from_shopping_list on matching meal-plan
// custom entries and deletes matching shopping-list custom items; restoring
// clears the flag (deleted custom items are not restored).
message SetItemExcludedRequest  {
  string name = 1;
  bool excluded = 2;
  string owner_user_id = 3;
}
message SetItemExcludedResponse {}

// --- Sharing ---

// ShoppingListShare is a user the caller has shared their list with.
// display_name resolves via the owner's contacts.
message ShoppingListShare {
  string user_id = 1;
  bool can_edit = 2;
  string display_name = 3;
}

message ShareShoppingListRequest {
  string contact_user_id = 1;
  bool can_edit = 2;
}
message ShareShoppingListResponse {}

message UnshareShoppingListRequest { string target_user_id = 1; }
message UnshareShoppingListResponse {}

message ListShoppingListSharesRequest {}
message ListShoppingListSharesResponse {
  repeated ShoppingListShare shares = 1;
}

// A list the caller can act on: their own (is_self) plus lists shared with
// them. Used to populate the "Viewing" owner switcher.
message ListOwner {
  string user_id = 1;
  string display_name = 2;
  bool can_edit = 3;
  bool is_self = 4;
}

message ListAccessibleListsRequest {}
message ListAccessibleListsResponse { repeated ListOwner owners = 1; }

service ShoppingListService {
  rpc GetCustomList             (GetCustomListRequest)             returns (GetCustomListResponse);
  rpc CreateShoppingItem           (CreateShoppingItemRequest)           returns (CreateShoppingItemResponse);
  rpc UpdateShoppingItem        (UpdateShoppingItemRequest)        returns (UpdateShoppingItemResponse);
  rpc DeleteShoppingItem        (DeleteShoppingItemRequest)        returns (DeleteShoppingItemResponse);
  rpc GetMealPlanExportItems    (GetMealPlanExportItemsRequest)    returns (GetMealPlanExportItemsResponse);
  rpc GetPlanIngredientGroups   (GetPlanIngredientGroupsRequest)   returns (GetPlanIngredientGroupsResponse);

  rpc ListCategories  (ListCategoriesRequest)  returns (ListCategoriesResponse);
  rpc CreateCategory  (CreateCategoryRequest)  returns (CreateCategoryResponse);
  rpc RenameCategory  (RenameCategoryRequest)  returns (RenameCategoryResponse);
  rpc DeleteCategory  (DeleteCategoryRequest)  returns (DeleteCategoryResponse);

  rpc ListStores         (ListStoresRequest)         returns (ListStoresResponse);
  rpc CreateStore        (CreateStoreRequest)        returns (CreateStoreResponse);
  rpc RenameStore        (RenameStoreRequest)        returns (RenameStoreResponse);
  rpc DeleteStore        (DeleteStoreRequest)        returns (DeleteStoreResponse);
  rpc GetStoreCategories (GetStoreCategoriesRequest) returns (GetStoreCategoriesResponse);
  rpc SetStoreCategories (SetStoreCategoriesRequest) returns (SetStoreCategoriesResponse);

  rpc ListItemNames      (ListItemNamesRequest)      returns (ListItemNamesResponse);
  rpc ListItemCategories (ListItemCategoriesRequest) returns (ListItemCategoriesResponse);
  rpc SetItemCategory    (SetItemCategoryRequest)    returns (SetItemCategoryResponse);
  rpc SetItemExcluded    (SetItemExcludedRequest)    returns (SetItemExcludedResponse);

  rpc ShareShoppingList      (ShareShoppingListRequest)      returns (ShareShoppingListResponse);
  rpc UnshareShoppingList    (UnshareShoppingListRequest)    returns (UnshareShoppingListResponse);
  rpc ListShoppingListShares (ListShoppingListSharesRequest) returns (ListShoppingListSharesResponse);
  rpc ListAccessibleLists    (ListAccessibleListsRequest)    returns (ListAccessibleListsResponse);
}

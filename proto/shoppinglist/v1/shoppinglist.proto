syntax = "proto3";
package shoppinglist.v1;
option go_package = "tools.xdoubleu.com/gen/shoppinglist/v1;shoppinglistv1";

message ShoppingItem {
  string name   = 1;
  string amount = 2;
  string unit   = 3;
  string id     = 4;
}

message DayShoppingItems {
  string date              = 1;
  repeated ShoppingItem items = 2;
}

message GetCustomListRequest  {}
message GetCustomListResponse { repeated ShoppingItem items = 1; }

message AddShoppingItemRequest {
  string name   = 1;
  string amount = 2;
  string unit   = 3;
}
message AddShoppingItemResponse { ShoppingItem item = 1; }

message DeleteShoppingItemRequest  { string item_id = 1; }
message DeleteShoppingItemResponse {}

message GetMealPlanExportItemsRequest  { string plan_id = 1; }
message GetMealPlanExportItemsResponse { repeated DayShoppingItems day_items = 1; }

service ShoppingListService {
  rpc GetCustomList          (GetCustomListRequest)          returns (GetCustomListResponse);
  rpc AddShoppingItem        (AddShoppingItemRequest)        returns (AddShoppingItemResponse);
  rpc DeleteShoppingItem     (DeleteShoppingItemRequest)     returns (DeleteShoppingItemResponse);
  rpc GetMealPlanExportItems (GetMealPlanExportItemsRequest) returns (GetMealPlanExportItemsResponse);
}

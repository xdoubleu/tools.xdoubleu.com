syntax = "proto3";
package auth.v1;
option go_package = "tools.xdoubleu.com/gen/auth/v1;authv1";

service AuthService {
  rpc SignIn(SignInRequest) returns (SignInResponse);
  rpc MFAEnroll(MFAEnrollRequest) returns (MFAEnrollResponse);
  rpc MFAEnrollVerify(MFAEnrollVerifyRequest) returns (MFAEnrollVerifyResponse);
  rpc MFAEnrollSkip(MFAEnrollSkipRequest) returns (MFAEnrollSkipResponse);
  rpc MFAChallenge(MFAChallengeRequest) returns (MFAChallengeResponse);
  rpc MFAUnenroll(MFAUnenrollRequest) returns (MFAUnenrollResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ExchangeToken(ExchangeTokenRequest) returns (ExchangeTokenResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
  rpc SignOut(SignOutRequest) returns (SignOutResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
}

message SignInRequest {
  string email = 1;
  string password = 2;
  bool remember_me = 3;
  string redirect = 4;
}

message SignInResponse {
  bool needs_mfa = 1;
  bool enroll_mfa = 2;
}

message MFAEnrollRequest {}

message MFAEnrollResponse {
  string qr_svg = 1;
  string secret = 2;
  string factor_id = 3;
}

message MFAEnrollVerifyRequest {
  string factor_id = 1;
  string code = 2;
}

message MFAEnrollVerifyResponse {}

message MFAEnrollSkipRequest {}

message MFAEnrollSkipResponse {}

message MFAUnenrollRequest {}

message MFAUnenrollResponse {}

message MFAChallengeRequest {
  string code = 1;
}

message MFAChallengeResponse {}

message ForgotPasswordRequest {
  string email = 1;
}

message ForgotPasswordResponse {}

message ExchangeTokenRequest {
  string access_token = 1;
  string refresh_token = 2;
}

message ExchangeTokenResponse {
  bool needs_mfa = 1;
}

message UpdatePasswordRequest {
  string new_password = 1;
}

message UpdatePasswordResponse {}

message SignOutRequest {}

message SignOutResponse {}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  string role = 1;
  repeated string app_access = 2;
  bool has_mfa = 3;
  // Public profile display name; empty when unset (share links require this
  // to be set first, see profile.v1.ProfileService).
  string display_name = 4;
}

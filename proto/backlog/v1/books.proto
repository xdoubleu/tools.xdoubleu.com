syntax = "proto3";
package backlog.v1;
option go_package = "tools.xdoubleu.com/gen/backlog/v1;backlogv1";

message Book {
  string id = 1;
  string title = 2;
  repeated string authors = 3;
  string isbn13 = 4;
  string cover_url = 5;
  string description = 6;
  int32 page_count = 7;
}

message UserBook {
  string id = 1;
  string user_id = 2;
  string book_id = 3;
  Book book = 4;
  string status = 5;
  repeated string tags = 6;
  int32 rating = 7;
  reserved 8;
  repeated string finished_at = 9;
  string added_at = 10;
  string updated_at = 11;
  string progress_mode = 12;
  int32 current_page = 13;
  int32 progress_percent = 14;
  repeated string formats = 15;
}

message BookShelf {
  string name = 1;
  repeated UserBook books = 2;
}

message LibraryResponse {
  repeated UserBook reading = 1;
  repeated UserBook wishlist = 2;
  repeated UserBook finished = 3;
  repeated BookShelf shelves = 4;
}

message BacklogSummary {
  int32 steam_count = 1;
  int32 books_count = 2;
}

message BooksProgressResponse {
  repeated string labels = 1;
  repeated string values = 2;
  string date_start = 3;
  string date_end = 4;
}

message ExternalBookResult {
  string provider = 1;
  string provider_id = 2;
  string title = 3;
  repeated string authors = 4;
  string isbn13 = 5;
  string cover_url = 6;
  string description = 7;
}

message GetSummaryRequest {}
message GetSummaryResponse { BacklogSummary summary = 1; }
message GetUserSummaryRequest { string user_id = 1; }
message GetUserSummaryResponse { BacklogSummary summary = 1; }

message GetLibraryRequest {}
message GetLibraryResponse { LibraryResponse library = 1; }

message GetBooksProgressRequest {
  string date_start = 1;
  string date_end = 2;
}
message GetBooksProgressResponse { BooksProgressResponse progress = 1; }

message SearchLibraryRequest { string query = 1; }
message SearchLibraryResponse { repeated UserBook books = 1; }

message SearchExternalRequest { string query = 1; }
message SearchExternalResponse { repeated ExternalBookResult results = 1; }

message AddBookRequest {
  string provider = 1;
  string provider_id = 2;
  string title = 3;
  string author = 4;
  string status = 5;
  string isbn13 = 6;
  string cover_url = 7;
  string description = 8;
  bool own_physical = 9;
  bool own_digital = 10;
}
message AddBookResponse {}

message UpdateBookStatusRequest {
  string book_id = 1;
  string status = 2;
  bool favourite = 3;
  string rating = 4;
  reserved 5;
}
message UpdateBookStatusResponse {}

message ToggleTagRequest {
  string book_id = 1;
  string tag = 2;
}
message ToggleTagResponse {}

message UpdateProgressRequest {
  string book_id = 1;
  string progress_mode = 2;
  int32 current_page = 3;
  int32 progress_percent = 4;
}
message UpdateProgressResponse {}

message ImportBooksRequest { bytes csv_data = 1; }
message ImportBooksResponse { int32 imported_count = 1; }

message CreateBookUploadRequest {
  string filename = 1;
  string content_type = 2;
  int64 size = 3;
  // SHA-256 hex digest of the file content, computed by the client.
  // When the content already exists in the store the server sets
  // already_exists=true in the response and the client skips the PUT.
  string checksum = 4;
}
message CreateBookUploadResponse {
  string upload_id = 1;
  string url = 2;
  // True when the file content is already stored. The client must skip the
  // PUT to url and call FinalizeBookUpload directly with the upload_id empty.
  bool already_exists = 3;
}

message FinalizeBookUploadRequest {
  string upload_id = 1;
  string filename = 2;
  string content_type = 3;
  // SHA-256 hex digest matching what was sent in CreateBookUploadRequest.
  string checksum = 4;
}
message FinalizeBookUploadResponse {
  string book_id = 1;
  string file_id = 2;
  string recognized_title = 3;
  bool matched_existing = 4;
  string format = 5;
}

message BookReadingStateData {
  string source = 1;
  int32 percent = 2;
  string location = 3;
  string updated_at = 4;
}

message UpdateReadingProgressRequest {
  string book_id = 1;
  string source = 2;
  int32 percent = 3;
  string location = 4;
}
message UpdateReadingProgressResponse {}

message GetReadingStateRequest { string book_id = 1; }
message GetReadingStateResponse { BookReadingStateData state = 1; }

message GetBookFileRequest {
  string book_id = 1;
  string format = 2;
}
message GetBookFileResponse {
  string url = 1;
  string expires_at = 2;
  string format = 3;
}

message EnableKoboSyncRequest { string book_id = 1; }
message EnableKoboSyncResponse { string kepub_status = 1; }

message GetKEPUBStatusRequest { string book_id = 1; }
message GetKEPUBStatusResponse {
  bool has_epub = 1;
  string kepub_status = 2;
  bool has_pdf = 3;
}

message KoboDevice {
  string id = 1;
  string name = 2;
  string serial = 3;
  string created_at = 4;
  string last_seen_at = 5;
}

message RegisterKoboDeviceRequest {
  string name = 1;
  string serial = 2;
}
message RegisterKoboDeviceResponse {
  KoboDevice device = 1;
  string raw_token = 2;
}

message ListKoboDevicesRequest {}
message ListKoboDevicesResponse { repeated KoboDevice devices = 1; }

message DisconnectKoboDeviceRequest { string id = 1; }
message DisconnectKoboDeviceResponse {}

message RequestKEPUBConversionRequest { string book_id = 1; }
message RequestKEPUBConversionResponse { string kepub_status = 1; }

message ClearLibraryRequest {}
message ClearLibraryResponse {
  uint32 deleted_books = 1;
  uint32 deleted_files = 2;
}

message DuplicateGroup {
  // Library entries judged to be the same book. entries[0] is the suggested
  // winner (the entry to keep); the rest are the suggested losers.
  repeated UserBook entries = 1;
  // Strongest matching signal: "isbn13" | "isbn10" | "title+author"
  string reason = 2;
}

message FindDuplicatesRequest {}
message FindDuplicatesResponse { repeated DuplicateGroup groups = 1; }

message MergeBooksRequest {
  // book_id of the UserBook entry to keep.
  string winner_book_id = 1;
  // book_ids of UserBook entries to merge into the winner, then delete.
  repeated string loser_book_ids = 2;
}
message MergeBooksResponse {
  // Always 1 — one group merged per call.
  uint32 merged_groups = 1;
  // Duplicate file rows removed (after format+checksum dedup).
  uint32 deleted_files = 2;
}

message ResyncOpenLibraryRequest {}
message ResyncOpenLibraryResponse {}

service BooksService {
  rpc GetSummary(GetSummaryRequest) returns (GetSummaryResponse);
  rpc GetUserSummary(GetUserSummaryRequest) returns (GetUserSummaryResponse);
  rpc GetLibrary(GetLibraryRequest) returns (GetLibraryResponse);
  rpc GetBooksProgress(GetBooksProgressRequest) returns (GetBooksProgressResponse);
  rpc SearchLibrary(SearchLibraryRequest) returns (SearchLibraryResponse);
  rpc SearchExternal(SearchExternalRequest) returns (SearchExternalResponse);
  rpc AddBook(AddBookRequest) returns (AddBookResponse);
  rpc UpdateBookStatus(UpdateBookStatusRequest) returns (UpdateBookStatusResponse);
  rpc UpdateProgress(UpdateProgressRequest) returns (UpdateProgressResponse);
  rpc ToggleTag(ToggleTagRequest) returns (ToggleTagResponse);
  rpc ImportBooks(ImportBooksRequest) returns (ImportBooksResponse);
  rpc UpdateReadingProgress(UpdateReadingProgressRequest) returns (UpdateReadingProgressResponse);
  rpc GetReadingState(GetReadingStateRequest) returns (GetReadingStateResponse);
  rpc CreateBookUpload(CreateBookUploadRequest) returns (CreateBookUploadResponse);
  rpc FinalizeBookUpload(FinalizeBookUploadRequest) returns (FinalizeBookUploadResponse);
  rpc GetBookFile(GetBookFileRequest) returns (GetBookFileResponse);
  rpc EnableKoboSync(EnableKoboSyncRequest) returns (EnableKoboSyncResponse);
  rpc RequestKEPUBConversion(RequestKEPUBConversionRequest) returns (RequestKEPUBConversionResponse);
  rpc GetKEPUBStatus(GetKEPUBStatusRequest) returns (GetKEPUBStatusResponse);
  rpc RegisterKoboDevice(RegisterKoboDeviceRequest) returns (RegisterKoboDeviceResponse);
  rpc ListKoboDevices(ListKoboDevicesRequest) returns (ListKoboDevicesResponse);
  rpc DisconnectKoboDevice(DisconnectKoboDeviceRequest) returns (DisconnectKoboDeviceResponse);
  rpc ClearLibrary(ClearLibraryRequest) returns (ClearLibraryResponse);
  rpc FindDuplicates(FindDuplicatesRequest) returns (FindDuplicatesResponse);
  rpc MergeBooks(MergeBooksRequest) returns (MergeBooksResponse);
  rpc ResyncOpenLibrary(ResyncOpenLibraryRequest) returns (ResyncOpenLibraryResponse);
}

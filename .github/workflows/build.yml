name: Build API & Web Workflow

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_api:
        type: boolean
        default: true
        description: 'Build API (Go proto stubs and binary)'
      build_web:
        type: boolean
        default: true
        description: 'Build web (TypeScript clients and Next.js)'

jobs:
  build:
    name: Build API & Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v5
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
        with:
          go-version-file: './api/go.mod'
          cache-dependency-path: './api/go.sum'
      - uses: bufbuild/buf-setup-action@v1
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Regenerate Go proto stubs
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
        run: make proto/generate
        working-directory: './api'
      - run: make build
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
        working-directory: './api'

      - uses: actions/setup-node@v4
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        with:
          cache: 'yarn'
          node-version-file: './web/package.json'
          cache-dependency-path: './web/yarn.lock'
      - run: corepack enable
      - run: yarn install --immutable
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        working-directory: './web'
      - name: Generate TypeScript ConnectRPC clients
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        working-directory: './web'
        run: yarn generate
      - name: Commit regenerated proto stubs if changed
        run: |
          git add api/gen/ web/lib/gen/
          git diff --cached --quiet || (git commit -m "chore: regenerate proto stubs" && git push)
      - run: yarn build
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        working-directory: './web'

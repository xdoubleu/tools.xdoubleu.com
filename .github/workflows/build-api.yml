name: Build API Workflow

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: './api/go.mod'
          cache-dependency-path: './api/go.sum'
      - run: make build
        working-directory: './api'
      # PR-time compile check for the darwin cross-build; the web Docker
      # image (which ships this binary) only builds on push to main.
      - run: make build/kobo-gateway
        working-directory: './api'

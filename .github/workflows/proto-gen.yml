name: Proto Regeneration Workflow

on:
  workflow_dispatch:
  workflow_call:

jobs:
  proto-gen:
    name: Proto Regeneration
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: bufbuild/buf-setup-action@v1
      - uses: actions/setup-go@v5
        with:
          go-version-file: './api/go.mod'
          cache-dependency-path: './api/go.sum'
      - name: Regenerate Go proto stubs
        run: make proto/generate
        working-directory: './api'
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          cache: 'yarn'
          node-version-file: './web/package.json'
          cache-dependency-path: './web/yarn.lock'
      - run: yarn install --immutable
        working-directory: './web'
      - name: Generate TypeScript ConnectRPC clients
        run: yarn generate
        working-directory: './web'
      - name: Commit regenerated proto stubs if changed
        run: |
          git add api/gen/ web/lib/gen/
          git diff --cached --quiet || (git commit -m "chore: regenerate proto stubs" && git push)

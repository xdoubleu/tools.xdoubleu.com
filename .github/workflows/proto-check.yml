name: Proto Staleness Check Workflow

on:
  workflow_dispatch:
  workflow_call:

jobs:
  proto-check:
    name: Proto Staleness Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: './web/package.json'
      - name: Install buf
        uses: actions/github-script@v9
        with:
          script: |
            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: 'bufbuild',
              repo: 'buf'
            });
            await exec.exec('sh', ['-c',
              `curl -sSL https://github.com/bufbuild/buf/releases/download/${release.tag_name}/buf-Linux-x86_64 -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf`
            ]);
      - name: Generate Go proto stubs
        run: buf generate
        working-directory: './api'
      - name: Generate TypeScript ConnectRPC clients
        run: buf generate
        working-directory: './web'
      - name: Fail if proto stubs are stale
        run: |
          git diff --exit-code api/gen/ web/lib/gen/ || \
            (echo "Proto stubs are out of date. Run 'make proto/generate' in api/ and 'yarn generate' in web/ then commit the results." && exit 1)
      - name: Lint proto files
        run: buf lint
        working-directory: './proto'

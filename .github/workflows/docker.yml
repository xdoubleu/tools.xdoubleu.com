name: Docker Build & Push Workflow

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_api:
        type: boolean
        default: false
      build_web:
        type: boolean
        default: false
    outputs:
      api_built:
        value: ${{ jobs.docker-api.outputs.built }}
      web_built:
        value: ${{ jobs.docker-web.outputs.built }}

jobs:
  docker-api:
    name: Docker Build & Push API
    if: github.event_name == 'workflow_dispatch' || inputs.build_api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      built: ${{ steps.build.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: |
            RELEASE=${{ github.sha }}

  docker-web:
    name: Docker Build & Push Web
    if: github.event_name == 'workflow_dispatch' || inputs.build_web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      built: ${{ steps.build.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            RELEASE=${{ github.sha }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

name: Docker Build & Push Workflow

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_api:
        type: boolean
        default: false
      build_web:
        type: boolean
        default: false
    outputs:
      api_built:
        value: ${{ jobs.docker.outputs.api_built }}
      web_built:
        value: ${{ jobs.docker.outputs.web_built }}

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_built: ${{ steps.build-api.conclusion == 'success' }}
      web_built: ${{ steps.build-web.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta-api
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build-api
        if: github.event_name == 'workflow_dispatch' || inputs.build_api
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
          build-args: |
            RELEASE=${{ github.sha }}

      - uses: docker/metadata-action@v6
        id: meta-web
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        id: build-web
        if: github.event_name == 'workflow_dispatch' || inputs.build_web
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            RELEASE=${{ github.sha }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}

name: Main Workflow

permissions:
  actions: write
  contents: read
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      proto: ${{ steps.filter.outputs.proto }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            proto:
              - 'proto/**'
            workflows:
              - '.github/workflows/**'

  proto-check:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: Proto Staleness Check Workflow
    uses: ./.github/workflows/proto-check.yml
    secrets: inherit

  build-api:
    needs: [changes, proto-check]
    if: |
      always() &&
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build API Workflow
    uses: ./.github/workflows/build-api.yml
    secrets: inherit

  build-web:
    needs: [changes, proto-check]
    if: |
      always() &&
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build Web Workflow
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  api-lint:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: API Lint Workflow
    uses: ./.github/workflows/api-lint.yml
    secrets: inherit

  web-lint:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: Web Lint Workflow
    uses: ./.github/workflows/web-lint.yml
    secrets: inherit

  api-test:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: API Test Workflow
    uses: ./.github/workflows/api-test.yml
    secrets: inherit

  web-test:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: Web Test Workflow
    uses: ./.github/workflows/web-test.yml
    secrets: inherit

  ci-pass:
    needs: [proto-check, build-api, build-web, api-lint, web-lint, api-test, web-test]
    if: always() && github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: read
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done

      - name: Wait for Codecov to report
        # Only the test jobs upload coverage, so only wait when one of them ran.
        # If both were skipped, Codecov never posts a status and there is nothing to wait for.
        if: needs.api-test.result == 'success' || needs.web-test.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # PRs: Codecov reports on the head commit, not the merge commit github.sha exposes.
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          echo "Waiting for Codecov status on $SHA"
          deadline=$(( $(date +%s) + 600 ))
          while true; do
            statuses=$(gh api "repos/$REPO/commits/$SHA/status" \
              --jq '.statuses[] | select(.context | startswith("codecov")) | "\(.context)=\(.state)"')

            if [[ -z "$statuses" ]]; then
              echo "No Codecov statuses yet; waiting..."
            else
              echo "$statuses"
              if echo "$statuses" | grep -qE '=(failure|error)$'; then
                echo "Codecov reported a failing status."
                exit 1
              fi
              if ! echo "$statuses" | grep -q '=pending$'; then
                echo "All Codecov statuses succeeded."
                exit 0
              fi
            fi

            if [[ $(date +%s) -ge $deadline ]]; then
              echo "Timed out waiting for Codecov to report."
              exit 1
            fi
            sleep 15
          done

  docker:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    name: Docker Build & Push Workflow
    uses: ./.github/workflows/docker.yml
    with:
      build_api: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
      build_web: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
    secrets: inherit

  deploy:
    needs: [docker]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.docker.result == 'success' &&
      (needs.docker.outputs.api_built == 'true' || needs.docker.outputs.web_built == 'true')
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Digital Ocean deployment
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments"

name: build & lint & test workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
      - run: make build
      - name: Commit regenerated templ files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/*_templ.go'
          git diff --staged --quiet || (git commit -m "chore: regenerate templ files [skip ci]" && git push)
      - name: Output HEAD SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  lint:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build.outputs.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
      - run: make lint

  test:
    needs: [build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.build.outputs.sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
      - run: make test/cov/report
      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

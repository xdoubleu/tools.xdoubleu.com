name: Main Workflow

permissions:
  actions: write
  contents: read
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      proto: ${{ steps.filter.outputs.proto }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            proto:
              - 'proto/**'
            workflows:
              - '.github/workflows/**'

  proto-check:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true'
    name: Proto Staleness Check Workflow
    uses: ./.github/workflows/proto-check.yml
    secrets: inherit

  build-api:
    needs: [changes, proto-check]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build API Workflow
    uses: ./.github/workflows/build-api.yml
    secrets: inherit

  build-web:
    needs: [changes, proto-check]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build Web Workflow
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  api-lint:
    needs: [changes, build-api]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      needs.build-api.result == 'success'
    name: API Lint Workflow
    uses: ./.github/workflows/api-lint.yml
    secrets: inherit

  web-lint:
    needs: [changes, build-web]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      needs.build-web.result == 'success'
    name: Web Lint Workflow
    uses: ./.github/workflows/web-lint.yml
    secrets: inherit

  api-test:
    needs: [changes, build-api]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      needs.build-api.result == 'success'
    name: API Test Workflow
    uses: ./.github/workflows/api-test.yml
    secrets: inherit

  web-test:
    needs: [changes, build-web]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      needs.build-web.result == 'success'
    name: Web Test Workflow
    uses: ./.github/workflows/web-test.yml
    secrets: inherit

  ci-pass:
    needs: [proto-check, build-api, build-web, api-lint, web-lint, api-test, web-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done

  docker:
    needs: [changes, proto-check, build-api, build-web, api-lint, web-lint, api-test, web-test]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped') &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    name: Docker Build & Push Workflow
    uses: ./.github/workflows/docker.yml
    with:
      build_api: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
      build_web: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
    secrets: inherit

  deploy:
    needs: [docker]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.docker.result == 'success'
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Digital Ocean deployment
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments"

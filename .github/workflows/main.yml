name: Main Workflow

permissions:
  actions: write
  contents: read
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      proto: ${{ steps.filter.outputs.proto }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            web:
              - 'web/**'
            proto:
              - 'proto/**'
            workflows:
              - '.github/workflows/**'

  proto-check:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: Proto Staleness Check Workflow
    uses: ./.github/workflows/proto-check.yml
    secrets: inherit

  build-api:
    needs: [changes, proto-check]
    if: |
      always() &&
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build API Workflow
    uses: ./.github/workflows/build-api.yml
    secrets: inherit

  build-web:
    needs: [changes, proto-check]
    if: |
      always() &&
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true') &&
      (needs.proto-check.result == 'success' || needs.proto-check.result == 'skipped')
    name: Build Web Workflow
    uses: ./.github/workflows/build-web.yml
    secrets: inherit

  api-lint:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: API Lint Workflow
    uses: ./.github/workflows/api-lint.yml
    secrets: inherit

  web-lint:
    needs: changes
    if: |
      github.event_name != 'push' &&
      (github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true')
    name: Web Lint Workflow
    uses: ./.github/workflows/web-lint.yml
    secrets: inherit

  api-test:
    needs: changes
    # Runs on push to main too (in parallel with docker/deploy, which do not
    # depend on it) purely to refresh Codecov's default-branch baseline.
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true'
    name: API Test Workflow
    uses: ./.github/workflows/api-test.yml
    secrets: inherit

  web-test:
    needs: changes
    # Runs on push to main too (in parallel with docker/deploy, which do not
    # depend on it) purely to refresh Codecov's default-branch baseline.
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.proto == 'true' ||
      needs.changes.outputs.workflows == 'true'
    name: Web Test Workflow
    uses: ./.github/workflows/web-test.yml
    secrets: inherit

  ci-pass:
    needs: [proto-check, build-api, build-web, api-lint, web-lint, api-test, web-test]
    if: always() && github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: read
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for result in $results; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              exit 1
            fi
          done

      - name: Wait for Codecov to report
        # Only the test jobs upload coverage, so only wait when one of them ran.
        # If both were skipped, Codecov never posts a status and there is nothing to wait for.
        if: needs.api-test.result == 'success' || needs.web-test.result == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # PRs: Codecov reports on the head commit, not the merge commit github.sha exposes.
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          # Codecov reports via the Checks API (codecov/patch, codecov/project),
          # not the legacy commit-status API, so poll check-runs.
          echo "Waiting for Codecov checks on $SHA"
          deadline=$(( $(date +%s) + 600 ))
          while true; do
            checks=$(gh api "repos/$REPO/commits/$SHA/check-runs?per_page=100" \
              --jq '.check_runs[] | select(.name | startswith("codecov")) | "\(.name)=\(.status):\(.conclusion)"')

            if [[ -z "$checks" ]]; then
              echo "No Codecov checks yet; waiting..."
            else
              echo "$checks"
              if echo "$checks" | grep -qv '=completed:'; then
                echo "Codecov checks still running..."
              elif echo "$checks" | grep -qvE '=completed:(success|neutral|skipped)$'; then
                echo "Codecov reported a failing check."
                exit 1
              else
                echo "All Codecov checks succeeded."
                exit 0
              fi
            fi

            if [[ $(date +%s) -ge $deadline ]]; then
              echo "Timed out waiting for Codecov to report."
              exit 1
            fi
            sleep 15
          done

  docker:
    needs: changes
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    name: Docker Build & Push Workflow
    uses: ./.github/workflows/docker.yml
    with:
      build_api: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.api == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
      build_web: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.web == 'true' || needs.changes.outputs.proto == 'true' || needs.changes.outputs.workflows == 'true' }}
    secrets: inherit

  deploy:
    needs: [docker]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.docker.result == 'success' &&
      (needs.docker.outputs.api_built == 'true' || needs.docker.outputs.web_built == 'true')
    name: Deploy to Digital Ocean
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Digital Ocean deployment and wait for it to finish
        env:
          DO_ACCESS_TOKEN: ${{ secrets.DO_ACCESS_TOKEN }}
          DO_APP_ID: ${{ secrets.DO_APP_ID }}
        run: |
          deployment=$(curl -sf -X POST \
            -H "Authorization: Bearer $DO_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments")
          deployment_id=$(echo "$deployment" | jq -r '.deployment.id')
          echo "Triggered deployment $deployment_id"

          # Poll until the deployment reaches a terminal phase so a failed
          # rollout fails this job instead of only firing a DO alert.
          deadline=$(( $(date +%s) + 1200 ))
          while true; do
            phase=$(curl -sf \
              -H "Authorization: Bearer $DO_ACCESS_TOKEN" \
              "https://api.digitalocean.com/v2/apps/$DO_APP_ID/deployments/$deployment_id" \
              | jq -r '.deployment.phase')
            echo "Deployment phase: $phase"
            case "$phase" in
              ACTIVE|SUPERSEDED)
                echo "Deployment finished."
                exit 0
                ;;
              ERROR|CANCELED)
                echo "Deployment failed with phase $phase."
                exit 1
                ;;
            esac
            if [[ $(date +%s) -ge $deadline ]]; then
              echo "Timed out waiting for deployment to finish."
              exit 1
            fi
            sleep 15
          done

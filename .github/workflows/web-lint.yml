name: Web Lint Workflow

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: Web Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          cache: 'npm'
          node-version-file: './web/package.json'
          cache-dependency-path: './web/package-lock.json'
      - run: npm ci
        working-directory: './web'
      - run: npm run lint
        working-directory: './web'

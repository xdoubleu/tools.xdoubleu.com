name: Commit Generated Proto Stubs Workflow

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  commit-gen:
    name: Commit Generated Proto Stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/download-artifact@v4
        with:
          name: proto-gen-${{ github.run_id }}
      - name: Fail if proto stubs are stale
        run: |
          git diff --exit-code api/gen/ web/lib/gen/ || \
            (echo "Proto stubs are out of date. Run 'buf generate' in api/ and 'yarn generate' in web/ and commit the results." && exit 1)

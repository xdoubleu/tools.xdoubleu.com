name: tools-xdoubleu-com
region: ams

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: tools.xdoubleu.com
    type: PRIMARY

ingress:
  rules:
    # Route /api/* to the api service, stripping the /api prefix before forwarding.
    # The api binary receives requests at their original paths (e.g. /auth.v1.AuthService/...).
    # Set NEXT_PUBLIC_API_URL=https://tools.xdoubleu.com/api in GitHub Variables.
    - component:
        name: api
        preserve_path_prefix: false
      match:
        path:
          prefix: /api
    # All other traffic goes to the web service.
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: api
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: xdoubleu/tools.xdoubleu.com/api
      tag: latest
    http_port: 8000
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      failure_threshold: 3
    envs:
      - key: ENV
        scope: RUN_TIME
        value: production
      - key: WEB_URL
        scope: RUN_TIME
        value: https://tools.xdoubleu.com
      - key: API_URL
        scope: RUN_TIME
        value: https://tools.xdoubleu.com/api
      - key: DB_DSN
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_PROJ_REF
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_REPO
        scope: RUN_TIME
        value: xdoubleu/tools.xdoubleu.com
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_ORG
        scope: RUN_TIME
        value: xdoubleu
      - key: SENTRY_PROJECT
        scope: RUN_TIME
        value: tools-xdoubleu-com
      # Set to this app's own ID so it can read its latest deployment. Left
      # blank ships the deploy-status card disabled (degraded) until filled in.
      - key: DO_APP_ID
        scope: RUN_TIME
        value: ""
      # OAuth app registration credentials for the admin-configurable
      # GitHub/Sentry/DigitalOcean observability integrations (issue #440).
      # These are the app's own OAuth client id/secret, registered once with
      # each provider — the resulting per-connection tokens are stored
      # encrypted in the database, not here. Until an admin connects each
      # provider from the /monitoring page, that section stays degraded.
      - key: GITHUB_OAUTH_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: GITHUB_OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_OAUTH_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: SENTRY_OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: DO_OAUTH_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: DO_OAUTH_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      # 32 raw bytes, base64-standard-encoded (e.g. `openssl rand -base64 32`).
      # Encrypts stored OAuth tokens at rest (global.oauth_connections).
      - key: ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET

  - name: web
    image:
      registry_type: GHCR
      registry: ghcr.io
      repository: xdoubleu/tools.xdoubleu.com/web
      tag: latest
    http_port: 3000
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: https://tools.xdoubleu.com/api
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
      # Used server-side by the OAuth 2.1 consent page (/oauth/consent) to drive
      # the Supabase authorization endpoints. SUPABASE_URL is
      # https://<SUPABASE_PROJ_REF>.supabase.co; the anon key is publishable.
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET

{{ template "header" }}
{{ template "navbar" }}
<div class="container py-3">
    {{template "ws" "todoist"}}

    <div class="mt-3">
    {{range $pair := .}}
        <h2 class="mt-4">{{$pair.State}}</h2>
        <table class="table table-hover">
            <thead>
            <tr>
                <th scope="col">Name</th>
                <th scope="col"></th>
                <th scope="col"></th>
            </tr>
            </thead>
            <tbody>
                {{range $goal := $pair.Goals}}
                    {{template "goal" $goal}}
                {{end}}
            </tbody>
        </table>
    {{end}}
    </div>
</div>
{{ template "footer" }}

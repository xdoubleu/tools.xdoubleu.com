{{ template "header" }}
{{ template "navbar" }}
<div class="container-fluid p-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">{{if .Plan.ID}}Edit Plan{{else}}New Plan{{end}}</h3>
        <a href="/recipes/plans" class="btn btn-outline-dark btn-sm">← Back</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="POST" action="{{.Action}}">

            <div class="mb-3">
              <label class="form-label fw-semibold">Plan name</label>
              <input type="text" name="name" class="form-control"
                value="{{.Plan.Name}}" placeholder="e.g. Weekly meals" required>
            </div>

            {{if .Plan.ID}}
            <div class="mb-3">
              <label class="form-label fw-semibold">iCal feed</label>
              <div class="d-flex flex-column gap-1">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox"
                    name="ical_hide_slots" value="breakfast" id="hideBreakfast"
                    {{if .HideBreakfast}}checked{{end}}>
                  <label class="form-check-label" for="hideBreakfast">Hide breakfast</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox"
                    name="ical_hide_slots" value="noon" id="hideNoon"
                    {{if .HideNoon}}checked{{end}}>
                  <label class="form-check-label" for="hideNoon">Hide noon</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox"
                    name="ical_hide_slots" value="evening" id="hideEvening"
                    {{if .HideEvening}}checked{{end}}>
                  <label class="form-check-label" for="hideEvening">Hide evening</label>
                </div>
                <div class="form-check mt-1">
                  <input class="form-check-input" type="checkbox"
                    name="ical_hide_past" value="true" id="hidePast"
                    {{if .Plan.ICalHidePast}}checked{{end}}>
                  <label class="form-check-label" for="hidePast">Hide past meals</label>
                </div>
              </div>
            </div>
            {{end}}

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-dark">Save</button>
              <a href="/recipes/plans{{if .Plan.ID}}/{{.Plan.ID}}{{end}}"
                class="btn btn-outline-secondary">Cancel</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
{{ template "footer" }}{{ template "page_end" }}

{{ template "header" }}
{{ template "navbar" }}
<div class="container py-4">

  <h3 class="mb-3">{{if .Recipe.ID}}Edit Recipe{{else}}New Recipe{{end}}</h3>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" action="{{.Action}}">
        {{if .IsEdit}}<input type="hidden" name="_action" value="update">{{end}}

        <div class="mb-3">
          <label class="form-label fw-semibold">Name</label>
          <input type="text" name="name" class="form-control"
            value="{{.Recipe.Name}}" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Instructions</label>
          <textarea name="instructions" class="form-control" rows="6"
            placeholder="Step-by-step instructions…">{{.Recipe.Instructions}}</textarea>
        </div>

        <div class="row mb-3">
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Base servings</label>
            <input type="number" name="base_servings" class="form-control"
              value="{{if .Recipe.BaseServings}}{{.Recipe.BaseServings}}{{else}}2{{end}}"
              min="1" required>
          </div>
        </div>

        <hr>
        <h5>Ingredients</h5>

        <div id="ingredients">
          {{range .Recipe.Ingredients}}
          <div class="row g-2 mb-2 ingredient-row">
            <div class="col-5">
              <input type="text" name="ingredient_name"
                class="form-control form-control-sm" placeholder="Name"
                value="{{.Name}}" required>
            </div>
            <div class="col-3">
              <input type="text" name="ingredient_amount"
                class="form-control form-control-sm" placeholder="Amount"
                value="{{.Amount}}">
            </div>
            <div class="col-3">
              <input type="text" name="ingredient_unit"
                class="form-control form-control-sm" placeholder="Unit (g, ml, cup…)"
                value="{{.Unit}}">
            </div>
            <div class="col-1">
              <button type="button" class="btn btn-outline-danger btn-sm w-100"
                onclick="this.closest('.ingredient-row').remove()">×</button>
            </div>
          </div>
          {{end}}
        </div>

        <button type="button" class="btn btn-outline-secondary btn-sm mt-1 mb-3"
          id="addIngredient">+ Add ingredient</button>

        <hr>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Save</button>
          <a href="{{if .IsEdit}}/recipes/{{.Recipe.ID}}{{else}}/recipes/list{{end}}"
            class="btn btn-outline-secondary">Cancel</a>
        </div>

      </form>
    </div>
  </div>

</div>

<script>
document.getElementById('addIngredient').addEventListener('click', function() {
  const row = document.createElement('div');
  row.className = 'row g-2 mb-2 ingredient-row';
  row.innerHTML = `
    <div class="col-5"><input type="text" name="ingredient_name"
      class="form-control form-control-sm" placeholder="Name" required></div>
    <div class="col-3"><input type="text" name="ingredient_amount"
      class="form-control form-control-sm" placeholder="Amount"></div>
    <div class="col-3"><input type="text" name="ingredient_unit"
      class="form-control form-control-sm" placeholder="Unit (g, ml, cup…)"></div>
    <div class="col-1"><button type="button" class="btn btn-outline-danger btn-sm w-100"
      onclick="this.closest('.ingredient-row').remove()">×</button></div>`;
  document.getElementById('ingredients').appendChild(row);
});
</script>

{{ template "footer" }}{{ template "page_end" }}

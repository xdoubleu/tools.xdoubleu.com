{{ template "header" }}
{{ template "navbar" }}
<div class="container py-4">

  <div class="d-flex align-items-center gap-3 mb-3">
    <a href="{{if .IsEdit}}/recipes/{{.Recipe.ID}}{{else}}/recipes/list{{end}}"
      class="btn btn-outline-secondary btn-sm">&larr; Back</a>
    <h3 class="mb-0">{{if .Recipe.ID}}Edit Recipe{{else}}New Recipe{{end}}</h3>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" action="{{.Action}}{{if .IsEdit}}?_action=update{{end}}">

        <div class="mb-3">
          <label class="form-label fw-semibold">Name</label>
          <input type="text" name="name" class="form-control"
            value="{{.Recipe.Name}}" required>
        </div>

        <div class="row mb-3">
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Base servings</label>
            <input type="number" name="base_servings" class="form-control"
              value="{{if .Recipe.BaseServings}}{{.Recipe.BaseServings}}{{else}}2{{end}}"
              min="1" required>
          </div>
        </div>

        <hr>
        <h5>Steps</h5>

        <div id="steps">
          {{range .Steps}}
          <div class="row g-2 mb-2 step-row">
            <div class="col-1 text-center fw-semibold pt-1 small text-muted step-num">
              {{.N}}.
            </div>
            <div class="col-10">
              <input type="text" name="step" class="form-control form-control-sm"
                placeholder="Describe this step…" value="{{.Text}}" required>
            </div>
            <div class="col-1">
              <button type="button" class="btn btn-outline-danger btn-sm w-100"
                onclick="this.closest('.step-row').remove();renumberSteps()">×</button>
            </div>
          </div>
          {{end}}
        </div>

        <button type="button" class="btn btn-outline-secondary btn-sm mt-1 mb-3"
          id="addStep">+ Add step</button>

        <hr>
        <h5>Ingredients</h5>

        <div id="ingredients">
          {{range .Recipe.Ingredients}}
          <div class="row g-2 mb-2 ingredient-row">
            <div class="col-5">
              <input type="text" name="ingredient_name"
                class="form-control form-control-sm" placeholder="Name"
                value="{{.Name}}" required>
            </div>
            <div class="col-3">
              <input type="text" name="ingredient_amount"
                class="form-control form-control-sm" placeholder="Amount"
                value="{{.Amount}}">
            </div>
            <div class="col-3">
              <input type="text" name="ingredient_unit"
                class="form-control form-control-sm" placeholder="Unit (g, ml, cup…)"
                value="{{.Unit}}">
            </div>
            <div class="col-1">
              <button type="button" class="btn btn-outline-danger btn-sm w-100"
                onclick="this.closest('.ingredient-row').remove()">×</button>
            </div>
          </div>
          {{end}}
        </div>

        <button type="button" class="btn btn-outline-secondary btn-sm mt-1 mb-3"
          id="addIngredient">+ Add ingredient</button>

        <hr>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">Save</button>
          <a href="{{if .IsEdit}}/recipes/{{.Recipe.ID}}{{else}}/recipes/list{{end}}"
            class="btn btn-outline-secondary">Cancel</a>
        </div>

      </form>
    </div>
  </div>

</div>

<script>
function renumberSteps() {
  document.querySelectorAll('#steps .step-row').forEach(function(row, i) {
    row.querySelector('.step-num').textContent = (i + 1) + '.';
  });
}

document.getElementById('addStep').addEventListener('click', function() {
  var idx = document.querySelectorAll('#steps .step-row').length + 1;
  var row = document.createElement('div');
  row.className = 'row g-2 mb-2 step-row';
  row.innerHTML =
    '<div class="col-1 text-center fw-semibold pt-1 small text-muted step-num">'
    + idx + '.</div>'
    + '<div class="col-10"><input type="text" name="step"'
    + ' class="form-control form-control-sm"'
    + ' placeholder="Describe this step…" required></div>'
    + '<div class="col-1"><button type="button"'
    + ' class="btn btn-outline-danger btn-sm w-100"'
    + ' onclick="this.closest(\'.step-row\').remove();renumberSteps()">×'
    + '</button></div>';
  document.getElementById('steps').appendChild(row);
});

document.getElementById('addIngredient').addEventListener('click', function() {
  var row = document.createElement('div');
  row.className = 'row g-2 mb-2 ingredient-row';
  row.innerHTML =
    '<div class="col-5"><input type="text" name="ingredient_name"'
    + ' class="form-control form-control-sm" placeholder="Name" required></div>'
    + '<div class="col-3"><input type="text" name="ingredient_amount"'
    + ' class="form-control form-control-sm" placeholder="Amount"></div>'
    + '<div class="col-3"><input type="text" name="ingredient_unit"'
    + ' class="form-control form-control-sm" placeholder="Unit (g, ml, cup…)"></div>'
    + '<div class="col-1"><button type="button"'
    + ' class="btn btn-outline-danger btn-sm w-100"'
    + ' onclick="this.closest(\'.ingredient-row\').remove()">×</button></div>';
  document.getElementById('ingredients').appendChild(row);
});

document.querySelector('form').addEventListener('submit', function() {
  this.querySelectorAll(
    '[name="ingredient_amount"],[name="ingredient_unit"]'
  ).forEach(function(inp) { if (!inp.value) inp.value = ' '; });
});
</script>

{{ template "footer" }}{{ template "page_end" }}

{{template "header"}}
<nav class="navbar bg-dark navbar-expand-lg" data-bs-theme="dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">tools.xdoubleu.com</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <span class="navbar-text">Room: <strong>{{.RoomCode}}</strong></span>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                {{if .IsPresenter}}
                <li class="nav-item">
                    <button id="start-screen-btn" class="btn btn-sm btn-outline-light">Start Screen</button>
                </li>
                <li class="nav-item">
                    <button id="stop-screen-btn" class="btn btn-sm btn-outline-warning" style="display:none;">Stop Screen</button>
                </li>
                {{end}}
                <li class="nav-item">
                    <a href="/watchparty/api/rooms/leave" class="btn btn-sm btn-outline-danger">Leave Room</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div id="video-container" style="position:relative;">
    <video id="screenVideo" autoplay playsinline
           style="width:100%; height:calc(100vh - 56px - 6rem); background:#000; object-fit:contain; display:block;"></video>

    <video id="selfCam" autoplay playsinline muted
           style="position:absolute; bottom:50px; right:10px; width:18%; border:2px solid #fff; cursor:grab; border-radius:4px; -webkit-transform: scaleX(-1); transform: scaleX(-1);"></video>

    <video id="remoteCam" autoplay playsinline
           style="position:absolute; top:10px; right:10px; width:18%; border:2px solid #fff; cursor:grab; border-radius:4px; display:none;"></video>

    <div id="controls-bar" style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6); padding:6px 12px; display:flex; align-items:center; gap:8px; z-index:10;">
        <button id="mic-btn"      class="btn btn-sm btn-outline-light">Mute Mic</button>
        <button id="cam-btn"      class="btn btn-sm btn-outline-light">Disable Cam</button>
        <button id="hide-self-btn" class="btn btn-sm btn-outline-light">Hide Self</button>
        {{if not .IsPresenter}}
        <div class="ms-auto d-flex align-items-center gap-2">
            <label class="text-white small mb-0 d-flex align-items-center gap-2">
                Stream vol
                <input id="stream-vol" type="range" min="0" max="1" step="0.05" value="1" style="width:90px; cursor:pointer;">
            </label>
        </div>
        {{end}}
    </div>
</div>

{{template "footer"}}
<script>
const ROOM = "{{.RoomCode}}";
const IS_PRESENTER = {{.IsPresenter}};
let ws, pcCam, pcScreen;
let localCam{{if .IsPresenter}}, localScreen{{end}};
let isSharingScreen = false;
let remoteCamStream = null;

const selfCamEl   = document.getElementById("selfCam");
const remoteCamEl = document.getElementById("remoteCam");
const mainVideoEl = document.getElementById("screenVideo");

// ── Drag-and-drop for PiP overlays ──────────────────────────────────────────

function makeDraggable(el) {
    let startX, startY, origLeft, origTop;

    el.addEventListener("pointerdown", e => {
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        el.style.cursor = "grabbing";

        const container = el.parentElement.getBoundingClientRect();
        const rect      = el.getBoundingClientRect();

        el.style.right  = "auto";
        el.style.bottom = "auto";
        el.style.left   = (rect.left - container.left) + "px";
        el.style.top    = (rect.top  - container.top)  + "px";

        startX   = e.clientX;
        startY   = e.clientY;
        origLeft = parseFloat(el.style.left);
        origTop  = parseFloat(el.style.top);
    });

    el.addEventListener("pointermove", e => {
        if (!el.hasPointerCapture(e.pointerId)) return;
        el.style.left = (origLeft + e.clientX - startX) + "px";
        el.style.top  = (origTop  + e.clientY - startY) + "px";
    });

    el.addEventListener("pointerup", e => {
        el.releasePointerCapture(e.pointerId);
        el.style.cursor = "grab";
    });
}

makeDraggable(selfCamEl);
makeDraggable(remoteCamEl);

// ── WebRTC helpers ───────────────────────────────────────────────────────────

function wsUrl() {
    return `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/watchparty/api/signaling`;
}

function send(type, payload, trackType) {
    const msg = { type, payload, trackType };
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
    } else {
        setTimeout(() => send(type, payload, trackType), 200);
    }
}

function createPC(trackType) {
    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });

    pc.onicecandidate = e => { if (e.candidate) send("candidate", e.candidate, trackType); };

    pc.ontrack = e => {
        if (trackType === "cam") {
            remoteCamStream = e.streams[0];
            if (isSharingScreen) {
                remoteCamEl.srcObject = remoteCamStream;
                remoteCamEl.style.display = "block";
            } else {
                mainVideoEl.srcObject = remoteCamStream;
                remoteCamEl.style.display = "none";
            }
        }
        if (trackType === "screen") {
            isSharingScreen = true;
            mainVideoEl.srcObject = e.streams[0];
            remoteCamEl.srcObject = remoteCamStream;
            remoteCamEl.style.display = "block";
            {{if .IsPresenter}}
            document.getElementById("stop-screen-btn").style.display = "inline-block";
            {{end}}
        }
    };

    pc.onconnectionstatechange = () => {
        if (trackType === "screen" &&
            (pc.connectionState === "disconnected" || pc.connectionState === "failed")) {
            {{if .IsPresenter}}
            stopScreenUI();
            {{else}}
            isSharingScreen = false;
            if (remoteCamStream) mainVideoEl.srcObject = remoteCamStream;
            remoteCamEl.style.display = "none";
            {{end}}
        }
    };

    return pc;
}

// ── Camera ───────────────────────────────────────────────────────────────────

async function startCamera() {
    localCam = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    selfCamEl.srcObject = localCam;
    pcCam = createPC("cam");
    localCam.getTracks().forEach(t => pcCam.addTrack(t, localCam));
    const offer = await pcCam.createOffer();
    await pcCam.setLocalDescription(offer);
    send("offer", offer, "cam");
}

{{if .IsPresenter}}
// ── Screen share ─────────────────────────────────────────────────────────────

async function startScreen() {
    localScreen = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    isSharingScreen = true;
    pcScreen = createPC("screen");
    localScreen.getTracks().forEach(t => pcScreen.addTrack(t, localScreen));
    const offer = await pcScreen.createOffer();
    await pcScreen.setLocalDescription(offer);
    send("offer", offer, "screen");

    document.getElementById("stop-screen-btn").style.display = "inline-block";
    document.getElementById("start-screen-btn").style.display = "none";

    localScreen.getVideoTracks()[0].onended = stopScreen;
}

function stopScreenUI() {
    isSharingScreen = false;
    document.getElementById("stop-screen-btn").style.display = "none";
    document.getElementById("start-screen-btn").style.display = "inline-block";
    if (remoteCamStream) mainVideoEl.srcObject = remoteCamStream;
    remoteCamEl.style.display = "none";
}

function stopScreen() {
    if (localScreen) {
        localScreen.getTracks().forEach(t => t.stop());
        localScreen = null;
    }
    if (pcScreen) {
        pcScreen.close();
        pcScreen = null;
    }
    stopScreenUI();
}

{{end}}

// ── WebSocket & renegotiation ────────────────────────────────────────────────

async function renegotiateAll() {
    if (pcCam) { pcCam.close(); pcCam = null; }
    if (localCam) {
        pcCam = createPC("cam");
        localCam.getTracks().forEach(t => pcCam.addTrack(t, localCam));
        const offer = await pcCam.createOffer();
        await pcCam.setLocalDescription(offer);
        send("offer", offer, "cam");
    }

    {{if .IsPresenter}}
    if (pcScreen) { pcScreen.close(); pcScreen = null; }
    if (isSharingScreen && localScreen) {
        pcScreen = createPC("screen");
        localScreen.getTracks().forEach(t => pcScreen.addTrack(t, localScreen));
        const offer = await pcScreen.createOffer();
        await pcScreen.setLocalDescription(offer);
        send("offer", offer, "screen");
    }
    {{else}}
    // Close the screen PC — the server will resend the presenter's screen
    // offer, which onmessage will handle by creating a new pcScreen.
    if (pcScreen) { pcScreen.close(); pcScreen = null; }
    {{end}}
}

function initWS() {
    ws = new WebSocket(wsUrl());

    ws.onopen = () => {
        ws.send(JSON.stringify({ roomCode: ROOM, role: IS_PRESENTER ? "presenter" : "viewer" }));
        renegotiateAll();
    };

    ws.onclose = () => setTimeout(initWS, 1500);
    ws.onerror = () => ws.close();

    ws.onmessage = async evt => {
        const msg = JSON.parse(evt.data);

        if (msg.type === "offer") {
            let pc = msg.trackType === "cam" ? pcCam : pcScreen;
            // A failed/closed screen PC can't accept a new offer — replace it
            if (pc && msg.trackType === "screen" &&
                (pc.signalingState === "closed" || pc.connectionState === "failed" ||
                 pc.connectionState === "closed")) {
                pc.close();
                pc = null;
                pcScreen = null;
            }
            if (!pc) {
                pc = createPC(msg.trackType);
                if (msg.trackType === "screen") pcScreen = pc;
                if (msg.trackType === "cam")    pcCam    = pc;
            }
            await pc.setRemoteDescription(msg.payload);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            send("answer", answer, msg.trackType);
        }

        if (msg.type === "answer") {
            const pc = msg.trackType === "cam" ? pcCam : pcScreen;
            if (pc && pc.signalingState === "have-local-offer") {
                await pc.setRemoteDescription(msg.payload);
            } else if (msg.trackType === "screen" && IS_PRESENTER &&
                       isSharingScreen && localScreen) {
                // Stale answer from viewer reconnect: re-initiate screen with fresh offer
                if (pcScreen) { pcScreen.close(); pcScreen = null; }
                pcScreen = createPC("screen");
                localScreen.getTracks().forEach(t => pcScreen.addTrack(t, localScreen));
                const offer = await pcScreen.createOffer();
                await pcScreen.setLocalDescription(offer);
                send("offer", offer, "screen");
            }
        }

        if (msg.type === "candidate") {
            const pc = msg.trackType === "cam" ? pcCam : pcScreen;
            if (pc) await pc.addIceCandidate(msg.payload);
        }
    };
}

initWS();
startCamera();
{{if .IsPresenter}}
document.getElementById("start-screen-btn").onclick = startScreen;
document.getElementById("stop-screen-btn").onclick  = stopScreen;
{{end}}

// ── Mic / camera controls ────────────────────────────────────────────────────

let micEnabled = true;
let camEnabled = true;
let selfCamVisible = true;

document.getElementById("mic-btn").onclick = () => {
    micEnabled = !micEnabled;
    if (localCam) localCam.getAudioTracks().forEach(t => { t.enabled = micEnabled; });
    const btn = document.getElementById("mic-btn");
    btn.textContent = micEnabled ? "Mute Mic" : "Unmute Mic";
    btn.className   = micEnabled ? "btn btn-sm btn-outline-light" : "btn btn-sm btn-outline-warning";
};

document.getElementById("cam-btn").onclick = () => {
    camEnabled = !camEnabled;
    if (localCam) localCam.getVideoTracks().forEach(t => { t.enabled = camEnabled; });
    // also hide/show self preview to match
    selfCamEl.style.display = (camEnabled && selfCamVisible) ? "block" : "none";
    const btn = document.getElementById("cam-btn");
    btn.textContent = camEnabled ? "Disable Cam" : "Enable Cam";
    btn.className   = camEnabled ? "btn btn-sm btn-outline-light" : "btn btn-sm btn-outline-warning";
};

document.getElementById("hide-self-btn").onclick = () => {
    selfCamVisible = !selfCamVisible;
    selfCamEl.style.display = (selfCamVisible && camEnabled) ? "block" : "none";
    const btn = document.getElementById("hide-self-btn");
    btn.textContent = selfCamVisible ? "Hide Self" : "Show Self";
    btn.className   = selfCamVisible ? "btn btn-sm btn-outline-light" : "btn btn-sm btn-outline-secondary";
};

// ── Audio mixing (viewer only) ───────────────────────────────────────────────

let manualVol = 1.0;

function applyVol(v) {
    if (isSharingScreen) mainVideoEl.volume = v;
}

{{if not .IsPresenter}}
document.getElementById("stream-vol").oninput = e => {
    manualVol = parseFloat(e.target.value);
    applyVol(manualVol);
};
{{end}}
</script>
{{template "page_end"}}

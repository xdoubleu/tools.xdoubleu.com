{{ define "books_progress.html" }}
<div class="card mb-3">
    <div class="card-body">
        <form hx-get="/backlog/books/progress" hx-target="#progress" hx-swap="innerHTML"
              class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label mb-1">From</label>
                <input type="date" name="from" class="form-control form-control-sm" value="{{ .DateStart }}">
            </div>
            <div class="col-auto">
                <label class="form-label mb-1">To</label>
                <input type="date" name="to" class="form-control form-control-sm" value="{{ .DateEnd }}">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-sm btn-outline-secondary">Apply</button>
            </div>
        </form>
    </div>
</div>
<div class="card">
    <div class="card-header">Books Read (cumulative)</div>
    <div class="card-body">
        <canvas id="progressChart"></canvas>
    </div>
</div>
<script>
(function () {
    const labels = {{ .Labels }};
    const values = {{ .Values }};
    if (!labels || labels.length === 0) return;
    const radii = values.map((v, i) => i === 0 || v !== values[i - 1] ? 4 : 0);
    new Chart(document.getElementById("progressChart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Books Read",
                data: values,
                borderColor: "rgb(153,102,255)",
                tension: 0,
                fill: false,
                pointRadius: radii,
                pointHoverRadius: 4,
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
})();
</script>
{{ end }}

{{ template "header" }}
{{ template "navbar" }}
<div class="container py-4">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/backlog/steam" class="btn btn-outline-secondary btn-sm">&larr; Back</a>
        <h2 class="mb-0">{{ .Label }} — {{ len .Games }} game(s)</h2>
    </div>

    {{ if .Games }}
    <div class="row g-3">
        {{ range .Games }}
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card h-100">
                <img src="https://cdn.akamai.steamstatic.com/steam/apps/{{ .ID }}/header.jpg"
                     class="card-img-top" alt="{{ .Name }}"
                     style="aspect-ratio:460/215;object-fit:cover"
                     onerror="this.style.display='none'">
                <div class="card-body p-2">
                    <p class="card-text small mb-1 fw-semibold">{{ .Name }}</p>
                    <span class="badge bg-primary">{{ .CompletionRate }}%</span>
                </div>
            </div>
        </div>
        {{ end }}
    </div>
    {{ else }}
    <p class="text-muted">No games in this range.</p>
    {{ end }}
</div>
{{ template "footer" }}
